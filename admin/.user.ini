; PHP settings for admin batch operations
; These override default php.ini settings for this directory

; Increase execution time for batch uploads (24 hours)
max_execution_time = 86400

; Increase memory limit for large batch processing
memory_limit = 512M

; Increase upload limits
upload_max_filesize = 50M
post_max_size = 55M

; Increase input time for slow uploads (24 hours)
max_input_time = 86400

; Increase input variables for large forms
max_input_vars = 5000
