; PHP settings for faculty profile operations
; These override default php.ini settings for this directory

; Increase execution time for large file uploads (30 minutes)
max_execution_time = 1800

; Increase memory limit for image processing
memory_limit = 256M

; Increase upload limits for profile pictures (supports up to 20MB)
upload_max_filesize = 25M
post_max_size = 30M

; Increase input time for slow uploads (30 minutes)
max_input_time = 1800

; Increase input variables for forms
max_input_vars = 3000
